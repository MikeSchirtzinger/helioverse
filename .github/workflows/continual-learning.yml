name: Refresh learning ledger

on:
  schedule:
    - cron: "17 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: helioverse-learning-ledger
  cancel-in-progress: false

jobs:
  collect-train-backtest:
    runs-on: ubuntu-latest
    env:
      NASA_DONKI_KEY: ${{ secrets.NASA_DONKI_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Collect exact-link outcomes and evaluate a challenger
        run: corepack pnpm learning:run
      - name: Persist ledger, run record, and registry
        run: |
          if git diff --quiet -- learning apps/web/public/learning/status.json; then
            exit 0
          fi
          git config user.name "Helioverse learning job"
          git config user.email "155995654+Mschirtzinger@users.noreply.github.com"
          git add learning apps/web/public/learning/status.json
          git commit -m "Update learning ledger and registry"
          git push
